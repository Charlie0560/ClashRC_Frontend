<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="index.css" />
    <title>Hello, world!</title>
  </head>
  <body>
    <div class="box">
      <div class="row">
          <div class="col-sm-3 card left">
              <div class="box1 card">
                  <div class="section1">
                    <center>
                        Marking Scheme
                    </center>
                  </div>
                  <div class="section2 ">
                      <center>
                          <div class="box3">
                            <div class="row">
                                <div class="col">100</div>
                                <div class="col">1</div>
                            </div>
                          </div>
                      </center>
                  </div>
              </div>
              <div class="box1 card">
                  <div class="section1">
                    <center>
                        Hints
                    </center>
                  </div>
                  <div class="section2">
                      <center>
                          <div class="box3 ">
                            <button class="btn btn-primary">Hints</button>
                          </div>
                      </center>
                  </div>
              </div>
          </div>



          <div class="col-sm-6 middle">
            <textarea class="card textarea"></textarea>
            <div class="card ">
                <div class="card-body row">
                    <div class="col">
                        <input class="w-100" type="text" name="name" id="name" placeholder="Name">
                    </div>
                    <div class="col">
                        <input class="w-100" type="Password" name="Password" id="Password" placeholder="Password">
                    </div>
                </div>
            </div>
            <center>
                <button class="btn btn-success m-2"> Submit</button>
            </center>
          </div>
          <div class="col-sm-3 card right">
            <div class="box1 card">
                <div class="section1">
                  <center>
                      Time
                  </center>
                </div>
                <div class="section2 ">
                    <center>
                        <div class="box3">
                          <div class="row">
                              <div class="col">80</div>
                              <div class="col">0</div>
                          </div>
                        </div>
                    </center>
                </div>
            </div><div class="box1 card">
                <div class="section1">
                  <center>
                      Questions
                  </center>
                </div>
                <div class="section2 ">
                    <center>
                        <div class="box3">
                         60
                        </div>
                    </center>
                </div>
            </div><div class="box1 card">
                <div class="section1">
                  <center>
                      Score
                  </center>
                </div>
                <div class="section2 ">
                    <center>
                        <div class="box3">
                            +55
                        </div>
                    </center>
                </div>
            </div>
          </div>
        </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
